name: python

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv lock --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv run --only-group dev poe lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv run --only-group dev poe format

  typecheck:
    needs: [lock, lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv run poe typecheck

  test:
    needs: [lock, lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv run poe test

  integration:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/librispeech
            ~/.cache/huggingface
          key: integration-data-v1
      - run: uv run poe test-integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv build
